version: "3.8"

services:
  mysql:
    image: mysql:8
    container_name: gateway_failover_mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gateway_failover
      MYSQL_USER: gateway_failover
      MYSQL_PASSWORD: gateway_failover
    volumes:
      - gateway_failover_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./gateway-failover-api
    container_name: gateway_failover_app
    restart: always
    ports:
      - "3333:3333"
    env_file:
      - ./gateway-failover-api/.env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      DB_HOST: mysql
      GW1_BASE_URL: http://gateway1:3001
      GW2_BASE_URL: http://gateway2:3002
      GW2_TOKEN: tk_f2198cc671b5289fa856
      GW2_SECRET: 3d15e8ed6131446ea7e3456728b1211f
      APP_URL: http://localhost:3333
      SEED_DB: false
    depends_on:
      mysql:
        condition: service_healthy
    command: >
      sh -c "
      wait-for-db.sh &&
      node ace migration:run --force &&
      if [ \"$$SEED_DB\" = \"true\" ]; then node ace db:seed; fi &&
      node build/bin/server.js
      "
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3333/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway1:
    image: matheusprotzen/gateways-mock
    container_name: gateway_failover_gateway1
    ports:
      - "3001:3001"
    environment:
      REMOVE_AUTH: "false"

  gateway2:
    image: matheusprotzen/gateways-mock
    container_name: gateway_failover_gateway2
    ports:
      - "3002:3002"
    environment:
      REMOVE_AUTH: "false"

volumes:
  gateway_failover_mysql_data:
