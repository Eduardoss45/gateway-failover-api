version: "3.8"

services:
  mysql:
    image: mysql:8
    container_name: betalent_mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: betalent
      MYSQL_USER: betalent
      MYSQL_PASSWORD: betalent
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./betalent-api
    container_name: betalent_app
    restart: always
    ports:
      - "3333:3333"
    env_file:
      - ./betalent-api/.env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      DB_HOST: mysql
      GW1_BASE_URL: http://gateway1:3001
      GW2_BASE_URL: http://gateway2:3002
      GW2_TOKEN: tk_f2198cc671b5289fa856
      GW2_SECRET: 3d15e8ed6131446ea7e3456728b1211f
      APP_URL: http://localhost:3333
    depends_on:
      mysql:
        condition: service_healthy
    command:
      [
        "sh",
        "-c",
        "wait-for-db.sh && node ace migration:run --force && node ace db:seed && node build/bin/server.js",
      ]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3333/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway1:
    image: matheusprotzen/gateways-mock
    container_name: betalent_gateway1
    ports:
      - "3001:3001"
    environment:
      REMOVE_AUTH: "false"

  gateway2:
    image: matheusprotzen/gateways-mock
    container_name: betalent_gateway2
    ports:
      - "3002:3002"
    environment:
      REMOVE_AUTH: "false"

volumes:
  mysql_data:
